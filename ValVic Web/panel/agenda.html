<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Citas - ValVic CRM</title>
    <!-- Mismas fuentes premium de ValVic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/panel.css">
    
    <!-- Iconos Phosphor Icons (usados en SaaS modernos) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <a href="../index.html" class="brand">
            <!-- Icono simplificado SVG -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="24" height="24" rx="6" fill="#2457F5"/>
                <path d="M7 8L12 16L17 8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Val<span>Vic</span>
        </a>

        <nav class="nav-menu">
            <a href="#" class="nav-link">
                <i class="ph ph-squares-four nav-icon"></i>
                Dashboard
            </a>
            <a href="#" class="nav-link active">
                <i class="ph ph-calendar-blank nav-icon"></i>
                Agenda / Citas
            </a>
            <a href="#" class="nav-link">
                <i class="ph ph-users nav-icon"></i>
                Pacientes
            </a>
            <a href="#" class="nav-link">
                <i class="ph ph-robot nav-icon"></i>
                IA de Vicky
            </a>
            <div style="flex:1"></div>
            <a href="#" class="nav-link" style="color: var(--ink-dark3);">
                <i class="ph ph-gear nav-icon"></i>
                Configuración
            </a>
            <a href="#" class="nav-link" style="color: var(--ink-dark3);">
                <i class="ph ph-sign-out nav-icon"></i>
                Cerrar Sesión
            </a>
        </nav>
    </aside>

    <!-- ESCRITORIO PRINCIPAL -->
    <main class="desk">
        
        <!-- TOPBAR -->
        <header class="topbar">
            <h1 class="topbar-title">Clínica Dental Sonrisas</h1>
            
            <div class="user-profile">
                <div class="user-info" style="text-align: right;">
                    <span class="user-name">Dra. Camila Rojas</span>
                    <span class="user-role">Administrador</span>
                </div>
                <div class="user-avatar">
                    CR
                </div>
            </div>
        </header>

        <!-- AREA DE CONTENIDO SCROLLABLE -->
        <div class="content-scroll">
            
            <!-- TARJETAS DE RESUMEN (STATS) -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="ph ph-calendar-check"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-val" id="stat-citas">-</span>
                        <span class="stat-label">Citas ValVic Acumuladas</span>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon green">
                        <i class="ph ph-robot"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-val">8</span>
                        <span class="stat-label">Agendadas por IA (Este mes)</span>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon gold">
                        <i class="ph ph-clock"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-val">3</span>
                        <span class="stat-label">Pendientes de confirmar</span>
                    </div>
                </div>
            </div>

            <!-- TABLA DE LA AGENDA -->
            <div class="section-header">
                <h2 class="section-title">Citas Programadas</h2>
                <button class="btn-primary">
                    <i class="ph ph-plus" style="vertical-align: middle; margin-right: 4px;"></i>
                    Nueva Cita Manual
                </button>
            </div>

            <div class="agenda-list" id="agenda-container">
                <div style="padding: 3rem; text-align: center; color: var(--ink-dark3);">
                    <i class="ph ph-spinner-gap ph-spin" style="font-size: 28px; margin-bottom: 12px; display:inline-block; animation: spin 1s linear infinite;"></i><br>
                    Cargando citas en tiempo real...
                </div>
            </div>
            <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
            <!-- Fin Tabla Agenda -->

        </div>
    </main>

    <script>
        async function fetchAgenda() {
            try {
                // Fetch al endpoint recién agregado en agente_conversacion.py
                const response = await fetch('/api/agenda');
                if (!response.ok) throw new Error("HTTP error " + response.status);
                const data = await response.json();
                renderAgenda(data.citas);
            } catch (error) {
                console.error("Error cargando agenda:", error);
                document.getElementById('agenda-container').innerHTML = `
                    <div style="padding: 3rem; text-align: center; color: rgba(234, 57, 67, 0.9);">
                        <i class="ph ph-warning-circle" style="font-size: 32px; margin-bottom: 12px; display:inline-block;"></i><br>
                        <strong style="color: white; font-size: 15px;">Servidor Desconectado</strong><br><br>
                        <span style="font-size:13px; color: var(--ink-dark3);">
                            Para ver datos reales, el backend debe estar corriendo.<br>
                            Abre tu terminal y ejecuta:<br>
                            <code style="background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px; margin-top: 10px; display:inline-block; color: white;">uvicorn agente_conversacion:app --host 0.0.0.0 --port 8000</code>
                        </span>
                    </div>
                `;
            }
        }

        function renderAgenda(citas) {
            const container = document.getElementById('agenda-container');
            
            if (!citas || citas.length === 0) {
                container.innerHTML = `
                    <div style="padding: 3rem; text-align: center; color: var(--ink-dark3);">
                        <i class="ph ph-calendar-blank" style="font-size: 32px; margin-bottom: 12px; display:inline-block; opacity:0.5;"></i><br>
                        No hay citas agendadas por la IA actualmente.
                    </div>`;
                document.getElementById('stat-citas').innerText = "0";
                return;
            }

            // Actualizar stats
            document.getElementById('stat-citas').innerText = citas.length;

            let html = `
                <div class="agenda-item agenda-header">
                    <span>Fecha Último Mensaje</span>
                    <span>Paciente (Teléfono)</span>
                    <span>Etapa CRM</span>
                    <span>Estado</span>
                    <span>Link al Chat</span>
                </div>
            `;

            citas.forEach(cita => {
                const date = new Date(cita.updated_at);
                const timeStr = date.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });
                const dateStr = date.toLocaleDateString('es-CL', { day: '2-digit', month: 'short' });

                const telStr = cita.telefono.replace('+', '');
                const waLink = "https://wa.me/" + telStr;

                html += `
                <div class="agenda-item">
                    <div class="time-badge">${timeStr}<br><span style="font-size:10px;font-family:'DM Sans';color:var(--ink-dark3)">${dateStr}</span></div>
                    <div class="patient-info">
                        <span class="patient-name">Lead Autogenerado</span>
                        <span class="patient-phone">${cita.telefono}</span>
                    </div>
                    <div><span class="service-tag" style="text-transform: capitalize;">${cita.etapa.replace(/_/g, ' ')}</span></div>
                    <div><span class="badge-status status-confirmed">Agenda por IA</span></div>
                    <div>
                        <a href="${waLink}" target="_blank" class="action-btn" title="Continuar chat en WhatsApp" style="text-decoration:none; display:inline-block; padding: 8px 12px; font-size:16px;">
                            <i class="ph ph-whatsapp-logo" style="color: #25D366;"></i>
                        </a>
                    </div>
                </div>
                `;
            });

            container.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', fetchAgenda);
    </script>
</body>
</html>
