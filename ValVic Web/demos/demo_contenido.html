<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ValVic — Demo: Contenido IA para Redes</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F2F0EC;--surface:#FFF;--ink:#18181A;--ink2:#5C5C62;--ink3:#9C9CA4;
  --purple:#6B4EFF;--purple-light:rgba(107,78,255,0.09);
  --border:#E4E2DC;--radius:14px;
}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;}
.logo span{color:var(--purple);}
.badge{font-size:11px;background:var(--purple-light);color:var(--purple);border:1px solid rgba(107,78,255,0.18);padding:4px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em;}

.layout{display:grid;grid-template-columns:340px 1fr;gap:0;max-width:1100px;margin:2rem auto;border-radius:20px;overflow:hidden;border:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,0.06);}

/* ── Left form panel ── */
.form-panel{background:var(--surface);padding:1.75rem;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:1.1rem;}
.form-panel h2{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:-.2rem;}
.form-panel p{font-size:13px;color:var(--ink2);line-height:1.5;}

.field label{font-size:12px;font-weight:500;color:var(--ink2);display:block;margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;padding:8px 11px;border:1px solid var(--border);
  border-radius:9px;font-size:13px;font-family:'Space Grotesk',sans-serif;
  color:var(--ink);background:var(--bg);outline:none;transition:border .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--purple);background:var(--surface);}
.field textarea{resize:none;line-height:1.5;}

.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px;}
.chip{font-size:12px;padding:5px 11px;border-radius:20px;border:1px solid var(--border);color:var(--ink2);cursor:pointer;background:transparent;font-family:'Space Grotesk',sans-serif;transition:all .15s;user-select:none;}
.chip.selected{background:var(--purple);color:white;border-color:var(--purple);}

.gen-btn{
  width:100%;padding:12px;background:var(--purple);color:white;
  border:none;border-radius:10px;font-size:14px;font-weight:600;
  font-family:'Space Grotesk',sans-serif;cursor:pointer;
  transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:.25rem;
}
.gen-btn:hover{background:#5A3EE0;transform:translateY(-1px);}
.gen-btn:active{transform:translateY(0);}
.gen-btn:disabled{opacity:.6;cursor:default;transform:none;}

/* ── Right results panel ── */
.results-panel{background:var(--bg);padding:1.75rem;display:flex;flex-direction:column;gap:12px;}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:300px;color:var(--ink3);text-align:center;gap:10px;}
.empty-icon{font-size:40px;opacity:.4;}
.empty-state p{font-size:14px;max-width:220px;line-height:1.5;}

.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px;}
.loading-dots{display:flex;gap:6px;}
.loading-dots span{width:8px;height:8px;border-radius:50%;background:var(--purple);animation:bounce 1.1s ease-in-out infinite;opacity:.3;}
.loading-dots span:nth-child(2){animation-delay:.18s;}
.loading-dots span:nth-child(3){animation-delay:.36s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-7px);opacity:1}}
.loading-msg{font-size:13px;color:var(--ink3);}

.context-banner{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--ink2);display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.ctx-tag{background:var(--purple-light);color:var(--purple);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:500;}

.post-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;opacity:0;transform:translateY(8px);animation:fadeUp .35s ease forwards;}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.post-header{padding:9px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.plat-dot{width:10px;height:10px;border-radius:50%;}
.plat-name{font-size:12px;font-weight:500;color:var(--ink2);}
.post-day{margin-left:auto;font-size:11px;color:var(--ink3);}
.post-body{padding:13px 14px;}
.post-text{font-size:13px;line-height:1.65;color:var(--ink);white-space:pre-line;}
.post-tags{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px;}
.post-tag{font-size:11px;color:var(--purple);}
.post-actions{padding:8px 14px;border-top:1px solid var(--border);display:flex;gap:8px;}
.post-btn{font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--ink2);cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all .15s;}
.post-btn:hover{background:var(--bg);color:var(--ink);}
.post-btn.done{color:#16C784;border-color:#16C784;}

@media(max-width:768px){
  .layout{grid-template-columns:1fr;margin:1rem;}
  .form-panel{border-right:none;border-bottom:1px solid var(--border);}
}
</style>
</head>
<body>

<header>
  <div class="logo" style="display:flex;align-items:center;gap:6px;"><img src="../favicon-180-transparent.png" alt="ValVic" width="24" height="24">ValVic</div>

      <p>Completa los datos de tu negocio y genera posts listos para publicar.</p>
    </div>

      <label>Nombre del negocio</label>
      <input type="text" id="nombre" placeholder="Ej: Café Central, Clínica Vida...">
    </div>

    <div class="field">
      <label>Tipo de negocio</label>
      <select id="tipo">
        <option value="restaurante">Restaurante / Café</option>
        <option value="clinica">Clínica / Salud</option>
        <option value="spa">Spa / Belleza</option>
        <option value="tienda">Tienda online</option>
        <option value="gym">Gimnasio / Fitness</option>
        <option value="educacion">Academia / Educación</option>
      </select>
    </div>

    <div class="field">
      <label>¿Qué te diferencia de la competencia?</label>
      <input type="text" id="diferenciador" placeholder="Ej: atención 24/7, solo ingredientes orgánicos...">
    </div>

    <div class="field">
      <label>Tono de comunicación</label>
      <div class="chips" id="tono-chips">
        <div class="chip selected" data-val="cercano">Cercano</div>
        <div class="chip" data-val="profesional">Profesional</div>
        <div class="chip" data-val="divertido">Divertido</div>
        <div class="chip" data-val="inspirador">Inspirador</div>
      </div>
    </div>

    <div class="field">
      <label>Redes sociales</label>
      <div class="chips" id="redes-chips">
        <div class="chip selected" data-val="ig">Instagram</div>
        <div class="chip selected" data-val="fb">Facebook</div>
        <div class="chip selected" data-val="li">LinkedIn</div>
      </div>
    </div>

    <div class="field">
      <label>¿Tienes alguna promo activa? <span style="color:var(--ink3);font-weight:400">(opcional)</span></label>
      <input type="text" id="promo" placeholder="Ej: 20% descuento en marzo, nueva sucursal...">
    </div>

    <button class="gen-btn" id="gen-btn" onclick="generar()">
      ✨ Generar contenido
    </button>
  </div>

  <!-- RESULTS -->
  <div class="results-panel" id="results">
    <div class="empty-state">
      <div class="empty-icon">✨</div>
      <p>Completa el formulario y genera tu contenido personalizado al instante</p>
    </div>
  </div>
</div>

<script>
// Chips — tono (single select)
document.getElementById('tono-chips').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('#tono-chips .chip').forEach(c => c.classList.remove('selected'));
  chip.classList.add('selected');
});

// Chips — redes (multi select, al menos 1)
document.getElementById('redes-chips').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  const selected = document.querySelectorAll('#redes-chips .chip.selected');
  if (chip.classList.contains('selected') && selected.length === 1) return;
  chip.classList.toggle('selected');
});

function getChipVal(containerId) {
  return [...document.querySelectorAll(`#${containerId} .chip.selected`)].map(c => c.dataset.val);
}

const loadMsgs = ['Analizando tu negocio...','Adaptando el tono...','Creando los posts...','Optimizando hashtags...'];

function generar() {
  const nombre = document.getElementById('nombre').value.trim() || 'Tu negocio';
  const tipo   = document.getElementById('tipo').value;
  const dif    = document.getElementById('diferenciador').value.trim();
  const promo  = document.getElementById('promo').value.trim();
  const tono   = getChipVal('tono-chips')[0] || 'cercano';
  const redes  = getChipVal('redes-chips');

  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Generando...';

  const results = document.getElementById('results');
  let mi = 0;
  results.innerHTML = `<div class="loading-wrap"><div class="loading-dots"><span></span><span></span><span></span></div><div class="loading-msg" id="lmsg">${loadMsgs[0]}</div></div>`;
  const interval = setInterval(() => {
    mi = (mi + 1) % loadMsgs.length;
    const el = document.getElementById('lmsg');
    if (el) el.textContent = loadMsgs[mi];
  }, 700);

  setTimeout(() => {
    clearInterval(interval);
    mostrarResultados(nombre, tipo, tono, redes, dif, promo, results);
    btn.disabled = false;
    btn.textContent = '✨ Regenerar contenido';
  }, 2200);
}

function mostrarResultados(nombre, tipo, tono, redes, dif, promo, results) {
  results.innerHTML = '';

  // Context banner
  const banner = document.createElement('div');
  banner.className = 'context-banner';
  banner.innerHTML = `
    <span style="font-weight:500;color:var(--ink);">Generado para:</span>
    <span class="ctx-tag">📌 ${nombre}</span>
    <span class="ctx-tag">${tono}</span>
    ${dif ? `<span class="ctx-tag">⭐ ${dif.slice(0,28)}${dif.length>28?'…':''}</span>` : ''}
    ${promo ? `<span class="ctx-tag">🎁 Promo activa</span>` : ''}`;
  results.appendChild(banner);

  const src = library[tipo]?.[tono] || library.restaurante.cercano;

  redes.forEach((r, i) => {
    const plat = plats[r];
    const post = src[r];
    if (!post) return;

    setTimeout(() => {
      const texto = post.t(nombre, dif, promo);
      const card = document.createElement('div');
      card.className = 'post-card';
      card.style.animationDelay = '0s';
      card.innerHTML = `
        <div class="post-header">
          <div class="plat-dot" style="background:${plat.color}"></div>
          <span class="plat-name">${plat.name}</span>
          <span class="post-day">${post.d}</span>
        </div>
        <div class="post-body">
          <div class="post-text">${post.e} ${texto}</div>
          <div class="post-tags">${post.tags.map(t=>`<span class="post-tag">${t}</span>`).join('')}</div>
        </div>
        <div class="post-actions">
          <button class="post-btn" onclick="copiar(this,\`${(post.e+' '+texto).replace(/`/g,"'")}\n\n${post.tags.join(' ')}\`)">Copiar</button>
          <button class="post-btn">Editar</button>
          <button class="post-btn">Programar</button>
        </div>`;
      results.appendChild(card);
    }, i * 130);
  });
}

function copiar(btn, texto) {
  navigator.clipboard.writeText(texto).then(() => {
    btn.textContent = '¡Copiado!'; btn.classList.add('done');
    setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('done'); }, 2000);
  });
}
