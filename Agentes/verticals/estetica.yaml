id: estetica
nombre_rubro: Centros de Estética
agente_nombre: Camila
producto_principal: citas

busqueda:
  queries:
    - "centro de estética"
    - "estética"
    - "botox"
    - "tratamiento láser"
    - "medicina estética"
    - "relleno dérmico"
    - "depilación láser"
  zonas_default:
    santiago:
      - "Providencia"
      - "Las Condes"
      - "Vitacura"
      - "Ñuñoa"
      - "Santiago centro"
      - "Maipú"
      - "La Florida"
    valparaiso:
      - "Viña del Mar"
      - "Valparaíso"

problema:
  descripcion: "horas de alta producción que quedan vacías por cancelaciones de último momento"
  gancho_economico: "Un procedimiento de botox vale $150-400 USD. Cada cancelación tardía es difícil de rellenar."
  pregunta_opener: "¿Les pasa que tienen cancelaciones de último momento y esa hora no se puede rellenar?"
  datos_industria: "Los centros estéticos tienen turnos de 45-90 minutos que son muy difíciles de rellenar con poca anticipación"

observaciones_por_volumen:
  alto: "Con ese volumen de tratamientos, imagino que la agenda está bastante ocupada"
  medio: "Tienen buena reputación en la zona"
  bajo: "Vi que están ofreciendo tratamientos en la zona"
  umbral_alto: 40
  umbral_medio: 12

objeciones:
  ya_tienen_sistema: "¿Ese sistema confirma automáticamente por WhatsApp 48h antes del tratamiento?"
  muy_caro: "¿Cuánto vale una hora de botox? Con una sesión recuperada al mes ya se paga."
  somos_pequenos: "Para centros pequeños es donde más cambia — una hora recuperada hace la diferencia."
  no_tengo_tiempo: "¿Cuándo tienes 15 minutos? Camila puede llamarte esta semana."
  lo_pienso: "¿Qué es lo que te frena?"

tono: "profesional y sofisticado"
contexto_tono: >
  Hablas con dueñas o administradoras de centros de estética premium.
  Tono más elevado que spa, más parecido a dental. El dolor es financiero
  (hora vacía de procedimiento caro). Validar la seriedad del negocio.

precios:
  # Ticket alto justifica precio ligeramente mayor
  citas_mensual_lista:  95
  citas_mensual_piso:   70
  citas_impl_lista:    100
  citas_impl_piso:      90
  web_mensual_lista:    50
  web_mensual_piso:     40
  web_impl_lista:      100
  web_impl_piso:        90
  bundle_mensual_lista: 135
  bundle_mensual_piso:   80
  bundle_impl_lista:    180
  bundle_impl_piso:     160
  senal_impl: 50

concesiones:
  - id: descuento_impl_10
    texto: "Te hago el 10% en la implementación, queda en $90."
    activar_si: primera_objecion_precio
  - id: pago_mitad_mitad
    texto: "Lo dividimos: $50 para empezar y el resto al entregar."
    activar_si: objecion_flujo_caja
  - id: descuento_mensual_3meses
    texto: "Los primeros 3 meses a $80/mes, después precio normal."
    activar_si: segunda_objecion_precio
  - id: primer_mes_gratis
    texto: "El primer mes sin costo para que veas los resultados."
    activar_si: ultima_instancia

deteccion_web:
  sin_web:
    pitch: "Vi que no tienen sitio web. Esto frena mucho a pacientes nuevos que buscan en Google antes de llamar."
    producto_sugerido: bundle
  web_basica:
    pitch: "Tienen web pero sin posicionamiento para búsquedas locales."
    producto_sugerido: bundle
  web_buena:
    pitch: null
    producto_sugerido: citas
