id: gimnasios
nombre_rubro: Gimnasios y Centros Deportivos
agente_nombre: Andrea
producto_principal: citas

busqueda:
  queries:
    - "gimnasio"
    - "crossfit"
    - "pilates"
    - "yoga studio"
    - "centro deportivo"
    - "funcional"
    - "box crossfit"
  zonas_default:
    santiago:
      - "Providencia"
      - "Las Condes"
      - "Ñuñoa"
      - "Santiago centro"
      - "Maipú"
      - "La Florida"
      - "Vitacura"
    valparaiso:
      - "Viña del Mar"
      - "Valparaíso"

problema:
  descripcion: "clases con cupos que no se llenan porque no hay recordatorios automáticos"
  gancho_economico: "Un cupo vacío en una clase de pilates o crossfit es ingreso que no se recupera"
  pregunta_opener: "¿Les pasa que tienen clases con cupos sin llenar por falta de confirmación?"
  datos_industria: "Los estudios de clases (pilates, yoga, crossfit) tienen 20-30% de cupos vacíos sin sistema automático"

observaciones_por_volumen:
  alto: "Con ese volumen de reviews, tienen una comunidad sólida"
  medio: "Tienen buenos comentarios en la zona"
  bajo: "Vi que están en la zona"
  umbral_alto: 40
  umbral_medio: 15

objeciones:
  ya_tienen_sistema: "¿Ese sistema confirma automáticamente por WhatsApp a cada persona que se inscribió?"
  muy_caro: "¿Cuánto vale llenar un cupo por clase? Con 2-3 cupos más por semana ya se paga."
  somos_pequenos: "Para estudios pequeños es donde más cambia — sin costo de administración extra."
  no_tengo_tiempo: "¿Cuándo tienes 15 minutos? Andrea puede llamarte."
  lo_pienso: "¿Qué es lo que te frena?"
  membresia_libre: "¿Tienen también clases con cupo? Para esas aplica perfectamente."

tono: "energético y directo"
contexto_tono: >
  Hablas con dueños de gimnasios o estudios de clases. Tono más informal
  y energético. El cliente está en un mundo de disciplina y resultados —
  apelar a eso. Evitar términos muy corporativos.

precios:
  citas_mensual_lista:  75
  citas_mensual_piso:   65
  citas_impl_lista:    100
  citas_impl_piso:      90
  web_mensual_lista:    50
  web_mensual_piso:     40
  web_impl_lista:      100
  web_impl_piso:        90
  bundle_mensual_lista: 115
  bundle_mensual_piso:   80
  bundle_impl_lista:    180
  bundle_impl_piso:     160
  senal_impl: 50

concesiones:
  - id: descuento_impl_10
    texto: "Te hago el 10% en la implementación, queda en $90."
    activar_si: primera_objecion_precio
  - id: pago_mitad_mitad
    texto: "Mitad al inicio, mitad cuando esté funcionando."
    activar_si: objecion_flujo_caja
  - id: descuento_mensual_3meses
    texto: "Los primeros 3 meses a $65/mes, después precio normal."
    activar_si: segunda_objecion_precio
  - id: primer_mes_gratis
    texto: "El primer mes sin costo para que veas los resultados."
    activar_si: ultima_instancia

deteccion_web:
  sin_web:
    pitch: "Vi que no tienen sitio web. Los nuevos miembros buscan en Google antes de ir en persona."
    producto_sugerido: bundle
  web_basica:
    pitch: "Tienen web pero sin posicionamiento local en Google."
    producto_sugerido: bundle
  web_buena:
    pitch: null
    producto_sugerido: citas
