id: mueblerias
nombre_rubro: Mueblerías y Tiendas de Diseño
agente_nombre: Valeria
producto_principal: web

busqueda:
  queries:
    - "mueblería"
    - "tienda de muebles"
    - "muebles a medida"
    - "decoración hogar"
    - "muebles de diseño"
    - "carpintería a medida"
  zonas_default:
    santiago:
      - "Providencia"
      - "Las Condes"
      - "Ñuñoa"
      - "Maipú"
      - "Santiago centro"
      - "San Bernardo"
    valparaiso:
      - "Viña del Mar"
      - "Valparaíso"

problema:
  descripcion: "sin presencia digital los clientes no los encuentran antes de ir a la competencia"
  gancho_economico: "El 65% de los clientes investiga online antes de visitar un showroom"
  pregunta_opener: "¿Cómo encuentran sus clientes nuevos el local? ¿Tienen presencia en Google?"
  datos_industria: "Las tiendas de muebles sin web pierden el 60% de los clientes potenciales en la búsqueda online"

observaciones_por_volumen:
  alto: "Con ese número de reseñas, claramente tienen clientela establecida"
  medio: "Tienen buena reputación en la zona"
  bajo: "Vi que tienen presencia en la zona"
  umbral_alto: 30
  umbral_medio: 10

objeciones:
  ya_tienen_instagram: "Instagram no aparece en Google cuando alguien busca 'mueblería [zona]'. Un sitio web sí."
  muy_caro: "¿Cuánto vale una venta? Con una venta más al mes ya se paga por un año."
  no_necesito: "¿Cómo llegan sus clientes nuevos hoy? Si es solo por referidos, están limitando el crecimiento."
  no_tengo_tiempo: "¿Cuándo tienes 15 minutos? Valeria puede llamarte."
  lo_pienso: "¿Qué es lo que te frena?"

tono: "profesional y orientado a resultados"
contexto_tono: >
  Hablas con dueños de mueblerías. Son comerciantes prácticos.
  El argumento principal es visibilidad en Google = más clientes sin pagar publicidad.
  Enfocarse en el retorno de inversión. El agente de citas es secundario —
  el dolor principal es no tener presencia digital, no la gestión de citas.

precios:
  # Producto principal: web profesional
  web_mensual_lista:    50
  web_mensual_piso:     40
  web_impl_lista:      200    # web con catálogo de productos
  web_impl_piso:       180
  # Agente de citas (visitas al showroom) — secundario
  citas_mensual_lista:  75
  citas_mensual_piso:   65
  citas_impl_lista:    100
  citas_impl_piso:      90
  bundle_mensual_lista: 110
  bundle_mensual_piso:   80
  bundle_impl_lista:    250
  bundle_impl_piso:     220
  senal_impl: 80

concesiones:
  - id: descuento_impl_10
    texto: "Te hago el 10% en la implementación, queda en $180."
    activar_si: primera_objecion_precio
  - id: pago_mitad_mitad
    texto: "Mitad al inicio, mitad cuando entregamos el sitio."
    activar_si: objecion_flujo_caja
  - id: descuento_mensual_3meses
    texto: "Los primeros 3 meses a $40/mes, después precio normal."
    activar_si: segunda_objecion_precio
  - id: primer_mes_gratis
    texto: "El primer mes de mantenimiento sin costo."
    activar_si: ultima_instancia

deteccion_web:
  sin_web:
    pitch: "Vi que no tienen sitio web. Cuando alguien busca 'mueblería [ciudad]' en Google, no aparecen."
    producto_sugerido: web
  web_basica:
    pitch: "Tienen web pero sin catálogo ni posicionamiento en Google."
    producto_sugerido: web
  web_buena:
    pitch: "Tienen buena web. ¿Tienen sistema para que los clientes agenden visita al showroom?"
    producto_sugerido: citas
