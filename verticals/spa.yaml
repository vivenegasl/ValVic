id: spa
nombre_rubro: Spas y Salones de Belleza
agente_nombre: Sofía
producto_principal: citas

busqueda:
  queries:
    - "spa"
    - "salón de belleza"
    - "peluquería"
    - "centro de belleza"
    - "barbería"
    - "nail spa"
  zonas_default:
    santiago:
      - "Providencia"
      - "Las Condes"
      - "Ñuñoa"
      - "Vitacura"
      - "Santiago centro"
      - "Maipú"
      - "La Florida"
      - "San Bernardo"
    valparaiso:
      - "Viña del Mar"
      - "Valparaíso"
      - "Con Con"

problema:
  descripcion: "horas al día respondiendo WhatsApp de clientes para agendar manualmente"
  gancho_economico: "Los salones pierden 6-8 horas semanales agendando por WhatsApp a mano"
  pregunta_opener: "¿Cuántas horas a la semana pasan respondiendo WhatsApp para agendar?"
  datos_industria: "AgendaPro tiene 20.000+ negocios de belleza — el problema es masivo y conocido"

observaciones_por_volumen:
  alto: "Con esa cantidad de reseñas, imagino que el WhatsApp no para"
  medio: "Tienen buena clientela en la zona"
  bajo: "Vi que están en la zona"
  umbral_alto: 50
  umbral_medio: 15

objeciones:
  ya_tienen_sistema: "¿Ese sistema le responde al cliente en WhatsApp directamente o igual tienen que confirmar a mano?"
  muy_caro: "¿Cuánto vale 6 horas de tu semana? Con eso solo ya se paga."
  somos_pequenos: "Justamente para salones pequeños es donde más horas libera."
  no_tengo_tiempo: "Tiene sentido, están ocupadas. ¿Cuándo tendrías 15 minutos?"
  lo_pienso: "¿Qué es lo que te frena? A veces lo resuelvo ahora."
  competencia_agendapro: "AgendaPro es agenda online — igual tienen que responder el WhatsApp a mano. Esto lo hace solo."

tono: "cercano y energético"
contexto_tono: >
  Hablas principalmente con dueñas de salones. Tono más informal y directo.
  El dolor es el tiempo, no el dinero. Validar la experiencia de estar
  respondiendo WhatsApp constantemente.

precios:
  # Benchmark: AgendaPro desde $29/mes (self-service). ValVic es done-for-you + WhatsApp nativo.
  citas_mensual_lista:  80
  citas_mensual_piso:   65
  citas_impl_lista:    100
  citas_impl_piso:      90
  web_mensual_lista:    50
  web_mensual_piso:     40
  web_impl_lista:      100
  web_impl_piso:        90
  bundle_mensual_lista: 120
  bundle_mensual_piso:   80
  bundle_impl_lista:    180
  bundle_impl_piso:     160
  senal_impl: 50

concesiones:
  - id: descuento_impl_10
    texto: "Te hago el 10% en la implementación, queda en $90."
    activar_si: primera_objecion_precio
  - id: pago_mitad_mitad
    texto: "Mitad para empezar, mitad cuando esté funcionando."
    activar_si: objecion_flujo_caja
  - id: descuento_mensual_3meses
    texto: "Los primeros 3 meses a $70/mes, después precio normal."
    activar_si: segunda_objecion_precio
  - id: primer_mes_gratis
    texto: "El primer mes sin costo para que veas cómo funciona."
    activar_si: ultima_instancia

deteccion_web:
  sin_web:
    pitch: "Vi que no tienen sitio web. El 70% de los clientes nuevos busca en Google antes de llamar."
    producto_sugerido: bundle
  web_basica:
    pitch: "Tienen web pero sin posicionamiento en Google."
    producto_sugerido: bundle
  web_buena:
    pitch: null
    producto_sugerido: citas
