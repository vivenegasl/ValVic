id: inmobiliarias
nombre_rubro: Inmobiliarias
agente_nombre: Valeria
producto_principal: web   # producto principal: web + respuesta rápida a leads

busqueda:
  queries:
    - "inmobiliaria"
    - "corredora de propiedades"
    - "propiedades en venta"
    - "arriendo de propiedades"
    - "corredor de propiedades"
  zonas_default:
    santiago:
      - "Santiago centro"
      - "Providencia"
      - "Las Condes"
      - "Ñuñoa"
      - "Vitacura"
      - "San Bernardo"
      - "Maipú"
    valparaiso:
      - "Valparaíso"
      - "Viña del Mar"
      - "Con Con"

problema:
  descripcion: "leads que llegan fuera de horario y nadie responde hasta el día siguiente"
  gancho_economico: "El 78% de los compradores elige la primera inmobiliaria que responde. Fuera de horario = cliente perdido."
  pregunta_opener: "¿Les llegan consultas por WhatsApp o web que no se pueden responder de inmediato?"
  datos_industria: "Las inmobiliarias reciben el 40% de sus consultas fuera de horario laboral"

observaciones_por_volumen:
  alto: "Con ese número de propiedades activas, imagino que reciben bastantes consultas"
  medio: "Tienen buena presencia en la zona"
  bajo: "Vi que están operando en la zona"
  umbral_alto: 20
  umbral_medio: 5

objeciones:
  ya_tienen_portal: "¿El portal les responde el WhatsApp de los interesados automáticamente o igual tienen que hacerlo a mano?"
  muy_caro: "¿Cuánto vale cerrar una operación? Con una venta más al año ya se paga por 10 años."
  somos_pequenos: "Para corredoras pequeñas es donde más cambia — responden igual de rápido que las grandes."
  no_tengo_tiempo: "¿Cuándo tienes 15 minutos? Valeria puede llamarte."
  lo_pienso: "¿Qué es lo que te frena?"

tono: "profesional y orientado a resultados"
contexto_tono: >
  Hablas con dueños o gerentes de inmobiliarias. Son personas orientadas
  a ventas y comisiones. El argumento tiene que ser financiero y concreto.
  Evitar términos técnicos. El gancho es velocidad de respuesta = más cierres.

precios:
  # Producto principal: web profesional + respuesta automática a leads
  web_mensual_lista:    70    # incluye mantenimiento + formulario de contacto automatizado
  web_mensual_piso:     55
  web_impl_lista:      200    # web más elaborada (galería de propiedades)
  web_impl_piso:       160
  # Agente de citas (visitas a propiedades)
  citas_mensual_lista:  90
  citas_mensual_piso:   70
  citas_impl_lista:    100
  citas_impl_piso:      90
  # Bundle (más elaborado para inmobiliarias)
  bundle_mensual_lista: 140
  bundle_mensual_piso:   90
  bundle_impl_lista:    250
  bundle_impl_piso:     200
  senal_impl: 80

concesiones:
  - id: descuento_impl_10
    texto: "Te hago el 10% en la implementación."
    activar_si: primera_objecion_precio
  - id: pago_mitad_mitad
    texto: "Lo dividimos: la mitad al inicio y la mitad cuando entregamos el sitio."
    activar_si: objecion_flujo_caja
  - id: descuento_mensual_3meses
    texto: "Los primeros 3 meses con descuento, después precio normal."
    activar_si: segunda_objecion_precio
  - id: primer_mes_gratis
    texto: "El primer mes sin costo para que veas el impacto en consultas."
    activar_si: ultima_instancia

deteccion_web:
  sin_web:
    pitch: "Vi que no tienen sitio web propio. Los portales como Portal Inmobiliario cobran comisión — su propio sitio les trae leads directos sin costo por transacción."
    producto_sugerido: web
  web_basica:
    pitch: "Tienen web pero sin formulario de captura de leads ni posicionamiento local."
    producto_sugerido: bundle
  web_buena:
    pitch: "Tienen buena web. ¿El WhatsApp de consultas lo responden de inmediato o hay demoras?"
    producto_sugerido: citas
