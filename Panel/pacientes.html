<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes CRM - ValVic Panel</title>
    <meta name="description" content="Directorio de clientes y leads gestionados por ValVic CRM.">
    <!-- Fuentes premium ValVic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/panel.css">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <!-- SIDEBAR via Web Component -->
    <sidebar-nav></sidebar-nav>

    <!-- ESCRITORIO PRINCIPAL -->
    <main class="desk" role="main">

        <!-- TOPBAR via Web Component -->
        <topbar-header title="Directorio de Clientes"></topbar-header>

        <div class="content-scroll">
            <div class="content-orb" aria-hidden="true"></div>

            <!-- BARRA DE BÚSQUEDA Y ACCIONES -->
            <div class="section-header">
                <h2 class="section-title">Base de Datos CRM</h2>
                <div class="section-actions">
                    <input type="search" class="search-input" placeholder="Buscar por teléfono o nombre…" aria-label="Buscar cliente">
                    <button class="btn-primary" type="button">
                        <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
                        Buscar
                    </button>
                    <button class="btn-outline" type="button">
                        <i class="ph ph-export" aria-hidden="true"></i>
                        Exportar CSV
                    </button>
                </div>
            </div>

            <!-- TABLA DE CLIENTES -->
            <section aria-labelledby="clientes-heading">
                <h2 id="clientes-heading" class="sr-only">Listado de clientes</h2>
                <div class="agenda-list" role="list" aria-label="Lista de clientes">

                    <!-- Header -->
                    <div class="agenda-item agenda-header patient-item" role="row">
                        <span>Registro</span>
                        <span>Cliente</span>
                        <span>Último Servicio</span>
                        <span>LTV (Gasto)</span>
                        <span>Ficha</span>
                    </div>

                    <!-- Fila 1 -->
                    <div class="agenda-item patient-item" role="listitem">
                        <div class="time-badge">
                            <span class="time-hour">23 Mar</span>
                            <span class="time-date">2026</span>
                        </div>
                        <div class="patient-info">
                            <span class="patient-name">Carlos Mendoza</span>
                            <span class="patient-phone">+56 9 8273 1122</span>
                        </div>
                        <div><span class="service-tag">Limpieza Dental</span></div>
                        <div class="ltv-value">$ 45.000</div>
                        <div>
                            <button class="action-btn" title="Ver ficha del cliente" aria-label="Ver ficha de Carlos Mendoza">
                                <i class="ph ph-file-text" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Fila 2 -->
                    <div class="agenda-item patient-item" role="listitem">
                        <div class="time-badge">
                            <span class="time-hour">20 Mar</span>
                            <span class="time-date">2026</span>
                        </div>
                        <div class="patient-info">
                            <span class="patient-name">Roberto Fuentes</span>
                            <span class="patient-phone">+56 9 9988 7766</span>
                        </div>
                        <div><span class="service-tag">Extracción Muela</span></div>
                        <div class="ltv-value">$ 120.000</div>
                        <div>
                            <button class="action-btn" title="Ver ficha del cliente" aria-label="Ver ficha de Roberto Fuentes">
                                <i class="ph ph-file-text" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>

                </div>
            </section>
        </div>
    </main>

    <!-- Components JS -->
    <script src="js/components/sidebar-nav.js"></script>
    <script src="js/components/topbar-header.js"></script>

    <!-- JS externo -->
    <script src="js/agenda.js"></script>
</body>
</html>
