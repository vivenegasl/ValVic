<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración IA - ValVic CRM</title>
    <meta name="description" content="Configuración del agente IA Vicky e integraciones del panel ValVic.">
    <!-- Fuentes premium ValVic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/panel.css">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <!-- SIDEBAR via Web Component -->
    <sidebar-nav></sidebar-nav>

    <!-- ESCRITORIO PRINCIPAL -->
    <main class="desk" role="main">

        <!-- TOPBAR via Web Component -->
        <topbar-header title="Configuración del Agente"></topbar-header>

        <div class="content-scroll">
            <div class="content-orb" aria-hidden="true"></div>

            <!-- CARD 1: Comportamiento IA -->
            <section aria-labelledby="ia-heading">
                <div class="settings-card">
                    <h3 id="ia-heading">Comportamiento Cierre de Ventas (IA)</h3>
                    <p>Ajustes finos para la escalera de concesiones y tolerancia de precios definidos en VENTAS.md</p>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="system-prompt">Mensaje Inicial (System Prompt Override)</label>
                            <textarea id="system-prompt" rows="4"
                                placeholder="Ej: Eres la recepcionista principal de la Clínica Dental Sonrisas…"></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="max-descuento">Máximo Descuento Permitido (%)</label>
                            <input type="number" id="max-descuento" value="15" min="0" max="50">
                            <label class="form-label mt-12" for="max-intercambios">Intercambios antes de escalado a humano</label>
                            <input type="number" id="max-intercambios" value="5" min="2" max="15">
                        </div>
                    </div>

                    <button class="btn-primary" type="button">
                        <i class="ph ph-floppy-disk" aria-hidden="true"></i>
                        Guardar Reglas IA
                    </button>
                </div>
            </section>

            <!-- CARD 2: Integraciones -->
            <section aria-labelledby="integraciones-heading">
                <div class="settings-card">
                    <h3 id="integraciones-heading">Integraciones</h3>
                    <p>Conexión con Meta WhatsApp Cloud API y sistemas de facturación/calendario</p>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="meta-api-status">Estado Meta WhatsApp Business</label>
                            <input type="text" id="meta-api-status" value="Conectado vía Meta Cloud API" readonly>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="webhook-url">Webhook URL (Retorno)</label>
                            <input type="text" id="webhook-url"
                                   value="https://api.valvic.cl/webhook/whatsapp" disabled>
                        </div>
                    </div>

                    <button class="btn-primary" type="button" disabled>
                        <i class="ph ph-plug" aria-hidden="true"></i>
                        Estado de la API
                    </button>
                </div>
            </section>

        </div>
    </main>

    <!-- Components JS -->
    <script src="js/components/sidebar-nav.js"></script>
    <script src="js/components/topbar-header.js"></script>

    <!-- JS externo -->
    <script src="js/agenda.js"></script>
</body>
</html>
