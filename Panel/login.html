<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro - ValVic Panel</title>
    <!-- Fuentes premium ValVic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
    <!-- Estilos del panel (sin CSS inline — cumple CSP) -->
    <link rel="stylesheet" href="css/panel.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="login-body">
    <canvas id="neural"></canvas>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>

    <div class="login-box">
        <div class="login-header">
            <a href="https://valvic.cl" class="brand" aria-label="ValVic inicio">
                <img src="favicon-180-transparent.png" alt="ValVic" class="brand-icon" width="30" height="30" loading="lazy">
                ValVic
            </a>
        </div>
        <div class="login-content">

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label class="form-label" for="email">Correo electrónico</label>
                <input type="email" class="form-input" id="email"
                       placeholder="contacto@clinica.cl" required autocomplete="email">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <input type="password" class="form-input" id="password"
                       placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-submit" id="btn-submit">Ingresar al Panel</button>
            <div class="error-msg" id="errorMsg" role="alert" aria-live="assertive"></div>
        </form>
        </div>
    </div>

    <!-- JS externo — sin inline scripts (cumple CSP 'self') -->
    <script src="js/neural.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
